<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Read Later</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="masthead">
        <svg class="leaf" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 4c-8 0-14 5-14 12 0 1.3.3 2.6.8 3.7C9 15 14 11 20 10c-4 2-7 5-9 10 6 0 11-4 11-11V4z" />
        </svg>
        <div>
          <h1>Read later</h1>
          <p class="tagline" id="tagline">A quiet shelf for what you meant to read.</p>
        </div>
      </header>

      <form id="save-form" class="save-form">
        <label class="field">
          <span class="label">Title</span>
          <input id="title" type="text" autocomplete="off" spellcheck="false" />
        </label>

        <label class="field">
          <span class="label">Link</span>
          <input id="url" type="url" autocomplete="off" spellcheck="false" required />
        </label>

        <label class="field">
          <span class="label">Tags <span class="hint">comma separated</span></span>
          <input id="tags" type="text" autocomplete="off" placeholder="e.g. essay, gardening" />
        </label>

        <div class="actions">
          <button type="submit" class="primary" id="save-btn">Tuck it away</button>
          <button type="button" class="ghost" id="open-list">Open shelf</button>
        </div>
      </form>

      <section class="recent" id="recent-section" hidden>
        <h2>Recently saved</h2>
        <ul id="recent-list"></ul>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
