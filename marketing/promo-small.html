<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Promo small</title>
    <link rel="stylesheet" href="_shared.css" />
    <style>
      body { width: 440px; height: 280px; overflow: hidden; }
      .tile { position: relative; width: 440px; height: 280px; padding: 28px 30px; background: var(--bg); overflow: hidden; }
      .tile::before { content: ""; position: absolute; inset: 0; background: radial-gradient(500px 260px at 0% 110%, var(--moss-tint), transparent 60%), radial-gradient(500px 260px at 110% -10%, var(--terracotta-tint), transparent 60%); opacity: 0.7; }
      .row { display: flex; gap: 14px; align-items: flex-start; position: relative; z-index: 1; }
      .leaf { width: 42px; height: 42px; transform: rotate(-10deg); margin-top: 2px; filter: drop-shadow(0 2px 4px rgba(60, 70, 50, 0.15)); }
      .wm { font-family: var(--serif); font-size: 32px; font-weight: 500; margin: 0; line-height: 1.1; color: var(--ink); }
      .sub { font-family: var(--serif); font-style: italic; color: var(--ink-soft); font-size: 15px; margin: 6px 0 0; }
      .tag-line { position: relative; z-index: 1; margin-top: 28px; display: inline-flex; gap: 6px; flex-wrap: wrap; }
      .tag-line .tag { font-family: var(--sans); font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="tile">
      <div class="row">
        <svg class="leaf" viewBox="0 0 24 24" fill="currentColor" style="color: var(--moss);"><path d="M20 4c-8 0-14 5-14 12 0 1.3.3 2.6.8 3.7C9 15 14 11 20 10c-4 2-7 5-9 10 6 0 11-4 11-11V4z"/></svg>
        <div>
          <p class="wm">Read Later</p>
          <p class="sub">A calm shelf for<br/>the things you meant to read.</p>
        </div>
      </div>
      <div class="tag-line">
        <span class="tag">save</span>
        <span class="tag">tag</span>
        <span class="tag">share</span>
      </div>
    </div>
  </body>
</html>
