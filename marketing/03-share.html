<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Share</title>
    <link rel="stylesheet" href="_shared.css" />
    <style>
      body { width: 1280px; height: 800px; }
      .scrim { position: fixed; inset: 0; background: rgba(30, 40, 30, 0.35); backdrop-filter: blur(4px); z-index: 5; }
      .dialog { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 10px; background: var(--bg-raised); color: var(--ink); padding: 22px; width: 520px; box-shadow: var(--shadow); z-index: 6; }
      .dialog h3 { font-family: var(--serif); font-weight: 500; margin: 0 0 4px; font-size: 20px; }
      .dialog .dsub { color: var(--ink-faint); font-size: 13px; margin: 0 0 12px; }
      .dialog .label { display: block; font-size: 11px; font-weight: 500; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 4px; }
      textarea { width: 100%; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; padding: 10px; color: var(--ink); background: var(--bg); border: 1px solid var(--line); border-radius: 6px; resize: none; word-break: break-all; }
      .note { font-size: 12px; color: var(--ink-faint); margin: 6px 0 0; font-style: italic; }
      .dactions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="watermarks"></div>
    <div class="page">
      <header class="page-header">
        <div class="brand">
          <svg class="leaf" viewBox="0 0 24 24" width="36" height="36"><path d="M20 4c-8 0-14 5-14 12 0 1.3.3 2.6.8 3.7C9 15 14 11 20 10c-4 2-7 5-9 10 6 0 11-4 11-11V4z"/></svg>
          <div>
            <h1>Reading shelf</h1>
            <p class="subtitle">What the tide left behind for you.</p>
          </div>
        </div>
        <nav class="top-actions">
          <button class="ghost">Share link</button>
          <button class="ghost">Copy as Markdown</button>
          <button class="ghost">Export</button>
          <button class="ghost">Import</button>
        </nav>
      </header>
      <ul class="item-list" id="list"></ul>
    </div>

    <div class="scrim"></div>
    <div class="dialog">
      <h3>Share 4 articles</h3>
      <p class="dsub">My reading list</p>

      <label class="label">Shareable link</label>
      <textarea rows="3" readonly>https://jonno.github.io/read-later/viewer.html#H4sIAAAAAAAAA12QwW7DIAyG3yXnqElobSV9BHVCmzZpN25uYFQshcSAq05V3n1kbXfZETj44_9f66TQSe4SWqMbQk9BBeoiBRUlKnSkgsA0xQFV1MGiCwqMHzjZQCo46iJMo_IUP8B6cqgyi3lMq8n7YJSeVP6WfxRrFEFvMVqrvUSzq5NDLrZXvaJe21Vc6m0jmnYji91Wq6bVTbtrDq0G3dRNXTd1Xe_21bY-iKLe7zpQhl9i5IfAmWdMXE8_aPPSfD96lPPFOZVxJhHTYgnfqGCMWPL0kQqvV0sF__DwBWPxYgK2AgAA</textarea>
      <p class="note">Anyone can open this link in their browser — no extension required.</p>

      <label class="label">Plain text</label>
      <textarea rows="3" readonly>• The Joy of Slow Reading (essay, reading)
  https://literaryhub.com/slow-reading

• A Naturalist's Guide to Lichen (nature)
  https://orionmagazine.org/lichen</textarea>

      <div class="dactions">
        <button class="primary">Copy link</button>
        <button class="ghost">Copy text</button>
        <button class="ghost">Close</button>
      </div>
    </div>

    <script type="module">
      import { SAMPLE } from "./_data.js";
      const ul = document.getElementById("list");
      for (const s of SAMPLE.slice(0, 4)) {
        const li = document.createElement("li");
        li.className = "item" + (s.read ? " read" : "");
        li.innerHTML = `
          <div class="item-head">
            <div class="favicon"></div>
            <div class="item-body">
              <a class="title-link">${s.title}</a>
              <div class="meta">
                <span class="host">${s.host}</span>
                <span class="dot">·</span>
                <span>${s.time}</span>
                <span class="dot">·</span>
                <span class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join(" ")}</span>
              </div>
            </div>
          </div>`;
        ul.append(li);
      }
    </script>
  </body>
</html>
